  <path d="M 145 104 C 149 102, 155 104, 156 109" fill="none" stroke="#6E9E8E" stroke-width="1.4" stroke-linecap="round"/>

  <path d="M 108 128 C 116 124, 126 128, 126 135 C 126 141, 118 144, 111 141 C 105 139, 103 132, 108 128 Z"
