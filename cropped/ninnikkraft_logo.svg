  <circle cx="94" cy="88" r="10" fill="#3E4F7A"/>
  <circle cx="94" cy="88" r="4" fill="#F6EFDE" opacity="0.55"/>

  <path d="M 140 100 C 148 94, 160 96, 163 106 C 165 114, 156 120, 147 118 C 140 116, 136 106, 140 100 Z"
