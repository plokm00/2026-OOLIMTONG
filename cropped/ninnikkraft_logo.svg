    <rect x="188" y="60" width="14" height="6" rx="2" fill="#7A5C8E" transform="rotate(24 195 63)"/>
    <rect x="46" y="66" width="12" height="6" rx="2" fill="#D69A3E" transform="rotate(12 52 69)"/>
    <rect x="182" y="152" width="12" height="6" rx="2" fill="#3E7A6D" transform="rotate(-20 188 155)"/>
