    <path d="M 65 78 C 40 95, 38 140, 60 165 C 78 186, 110 194, 140 188" />
    <path d="M 178 168 C 202 148, 205 100, 182 75 C 166 58, 140 50, 116 52" />
    <path d="M 60 100 C 52 118, 54 136, 66 150" opacity="0.6"/>
